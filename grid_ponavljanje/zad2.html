<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            gap: 10px;
            grid-template-columns:100px 100px 100px;
            grid-template-rows: 100px 100px;
        }
        p{
            display: flex;
            background-color: #242323;
            color: white;
            align-items: center;
            justify-content: left;
            padding: 20px;
            border-radius: 10%;
        }
        .a{
            order: -9;
        }
        .d{
            order: -10;
        }
        .f{
            order: -8;
        }
        .e{
            order: -7;
        }
        .b{
            order: -6;

        }
        .c{
            order: -5;
        }
    </style>
</head>
<body>
    <h1>Zadatak 2</h1>
    <div class="container">
        <p class="a">A</p>
        <p class="b">B</p>
        <p class="c">C</p>
        <p class="d">D</p>
        <p class="e">E</p>
        <p class="f">F</p>
    </div>
</body>
</html>
