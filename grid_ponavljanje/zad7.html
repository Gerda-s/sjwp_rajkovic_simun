<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 600px;
            display: grid;
            gap: 10px;
            grid-template-columns:1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr;
            font-size: 20px;
        }
        p{
            padding: 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            
        }
        .a{
            background-color: gray;
            color: white;
            grid-column: span 3;
        }
        .b{
            background-color: #242323;
            color: white;
            grid-column: span 1;
            grid-row: span 2;
            display: flex;
            align-items: start;
        }
        .c{
            background-color: #242323;
            color: white;
            grid-column: span 2;
            grid-row: span 2;
        }
        .d{
            background-color: lightgray;
            color: #242323;
            grid-column: span 3;
        }
        .e{
            background-color: gray;
            color: white;
            grid-column: span 3;
        }
    </style>
</head>
<body>
    <h1>Zadatak 6</h1>
    <div class="container">
        <p class="a">Header</p>
        <p class="b">Sidebar</p>
        <p class="c">Content <br>More content than we had before so <br>this column is now quite tall. </p>
        <p class="d">Sidebar 2</p>
        <p class="e">Footer</p>
    </div>
</body>
</html>
