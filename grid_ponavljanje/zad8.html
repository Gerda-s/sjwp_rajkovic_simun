<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 600px;
            display: grid;
            gap: 10px;
            grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr ;
            font-size: 20px;
        }
        p{
            padding: 20px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            
        }
        .siv{
            background-color: lightgray;
            color: black;
        }
        .crn{
            background-color: #242323;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Zadatak 8</h1>
    <div class="container">
        <p class="crn">1</p>
        <p class="siv">2</p>
        <p class="crn">3</p>
        <p class="siv">4</p>
        <p class="crn">5</p>
        <p class="siv">6</p>
        <p class="crn">7</p>
        <p class="siv">8</p>
        <p class="crn">9</p>
        <p class="siv">10</p>
        <p class="crn">11</p>
        <p class="siv">12</p>
    </div>

</body>
</html>
