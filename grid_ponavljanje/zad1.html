<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            gap: 10px;
            grid-template-columns:100px 100px 100px;
            grid-template-rows: 100px 100px;
        }
        p{
            display: flex;
            background-color: #242323;
            color: white;
            align-items: center;
            justify-content: left;
            padding: 20px;
            border-radius: 10%;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Zadatak 1</h1>
        <div class="container">
            <p>A</p>
            <p>B</p>
            <p>C</p>
            <p>D</p>
        <p>E</p>
        <p>F</p>
    </div>
    

</body>
</html>
