<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 600px;
            display: grid;
            gap: 10px;
            grid-template-columns:1fr 1fr 1fr 1fr 1fr ;
            grid-template-rows: 1fr 1fr 1fr;
            font-size: 20px;
        }
        p{
            padding: 20px;
            border-radius: 5px;
            background-color: #242323;
            color: white;
            display: flex;
            align-items: center;
            
        }
        .a{
            grid-column: span 2;
        }
        .b{
            grid-column: span 3;
        }
        .c{
            grid-column: span 1;
        }
        .e{
            grid-column: span 5;
        }
        .d{
            grid-column: span 3;
            grid-area: 2/2/3/5;
        }
        .f{
            grid-column: span 3;
            background-color: lightskyblue;
            opacity: 0.6;
            z-index: 1;
            grid-area: 2/3/3/6;
        }
    </style>
</head>
<body>
    <h1>Zadatak 9</h1>
    <div class="container">
        <p class="a">A</p>
        <p class="b">B</p>
        <p class="c">C</p>
        <p class="d">D</p>
        <p class="e">E</p>
        <p class="f">F</p>
    </div>
</body>
</html>
