<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            gap: 10px;
            grid-template-columns:100px 100px 100px  ;
            grid-template-rows:100px 100px ;
        }
        p{
            display: flex;
            background-color: #242323;
            color: white;
            align-items: center;
            justify-content: left;
            padding: 20px;
            border-radius: 10%;
        }
        .a{
            grid-column: span 2;
            
        }
        .b{
            grid-row: span 2;
            
        }
    </style>
</head>
<body>
    <h1>Zadatak 3</h1>
        <div class="container">
            <p class="a">A</p>
            <p class="b">B</p>
            <p class="c">C</p>
            <p class="d">D</p>
        </div>
</body>
</html>
