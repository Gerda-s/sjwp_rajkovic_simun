<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial;
    text-align: center;
    font-size: 25px;
}

.dashboard{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
}

.box{
    background: lightblue;
    padding: 40px 0;
    flex: 0 32%; /* ~3 u redu */
}

/* TABLET */
@media (max-width: 1023px){
    .box{
        flex: 0 49%; /* 2 u redu */
    }
}

/* MOBILE */
@media (max-width: 759px){
    .box{
        flex: 0 100%; /* 1 u redu */
    }
}
    </style>
</head>
<body>
    <div class="dashboard">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
</div>
</body>
</html>
