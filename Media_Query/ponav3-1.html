<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    box-sizing: border-box;
}

.gallery{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
}

.item{
    background: lightcoral;
    height: 100px;
}

/* TABLET */
@media (max-width: 1023px){
    .gallery{
        grid-template-columns: repeat(2, 1fr);
    }
}

/* MOBILE */
@media (max-width: 759px){
    .gallery{
        grid-template-columns: 1fr;
    }
}
    </style>
</head>
<body>
    <div class="gallery">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</body>
</html>
