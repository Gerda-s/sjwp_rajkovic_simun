<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    box-sizing: border-box;
}

.gallery{
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px;
}

.item{
    background: lightcoral;
    height: 100px;
    flex: 0 24%; /* 4 u redu */
}

/* TABLET */
@media (max-width: 1023px){
    .item{
        flex: 0 49%; /* 2 u redu */
    }
}

/* MOBILE */
@media (max-width: 759px){
    .item{
        flex: 0 100%; /* 1 u redu */
    }
}
    </style>
</head>
<body>
    <div class="gallery">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</body>
</html>
