<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.card {
  border: 1px solid #ccc;
  padding: 20px;
  text-align: center;
}

/* TABLET */
@media (max-width: 1023px) {
  .container {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* MOBILE */
@media (max-width: 767px) {
  .container {
    grid-template-columns: 1fr;
  }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">Proizvod 1</div>
        <div class="card">Proizvod 2</div>
        <div class="card">Proizvod 3</div>
        <div class="card">Proizvod 4</div>
        <div class="card">Proizvod 5</div>
        <div class="card">Proizvod 6</div>
        <div class="card">Proizvod 7</div>
        <div class="card">Proizvod 8</div>

    </div>
</body>
</html>
