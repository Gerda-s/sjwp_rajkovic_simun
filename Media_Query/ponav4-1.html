<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.box {
  padding: 20px;
  background: lightblue;
}

/* TABLET */
@media (max-width: 1023px) {
  .dashboard {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* MOBILE */
@media (max-width: 767px) {
  .dashboard {
    grid-template-columns: 1fr;
  }
}
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="box">Korisnici</div>
        <div class="box">Prodaja</div>
        <div class="box">Poruke</div>
        <div class="box">Statistika</div>
        <div class="box">Zadaci</div>
        <div class="box">Postavke</div>
    </div>
</body>
</html>
