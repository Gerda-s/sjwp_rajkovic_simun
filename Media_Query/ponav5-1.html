<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.big {
  grid-column: span 2;
}

.box {
  padding: 20px;
  background: lightcoral;
}

/* TABLET */
@media (max-width: 1023px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .big {
    grid-column: span 2;
  }
}

/* MOBILE */
@media (max-width: 767px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .big {
    grid-column: span 1;
  }
}
    </style>
</head>
<body>
    <div class="grid">
  <div class="box big">Kartica 1</div>
  <div class="box">Kartica 2</div>
  <div class="box">Kartica 3</div>
  <div class="box">Kartica 4</div>
  <div class="box">Kartica 5</div>
  <div class="box">Kartica 6</div>
</div>
</body>
</html>
