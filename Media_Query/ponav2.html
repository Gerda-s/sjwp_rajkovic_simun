<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            box-sizing: border-box;
        }

.container{
    display: flex;
    flex-wrap: wrap;
    height: 100vh;
}

body{
    font-family: Arial;
    text-align: center;
    font-size: 30px;
}


header, footer{
    flex: 0 100%;
    height: 10vh;
}

header{ background: slateblue; }
footer{ background: skyblue; }


main{
    display: flex;
    flex: 0 100%;
    height: 80vh;
}


.sidebar{
    background: lightgreen;
    width: 250px; 
}

.content{
    background: lightgoldenrodyellow;
    flex: 0 100%;
}
@media (max-width: 759px){
    main{
        flex-wrap: wrap;
    }

    .sidebar{
        width: 100%;
        order: -1;
    }

    .content{
        flex: 0 100%;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <main>
            
            <section class="sidebar">Left</section>
            <section class="content">Main</section>
            
        </main>
        <footer>Footer</footer>
    </div>
    
</body>
</html>
