<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            box-sizing: border-box;
            
        }
        .container{
            display: flex;
            height: 20vh;
            width: 300vh;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        main{
            display: flex;
            width: 100vh;
            justify-content: space-between;
            flex: 0 100%;
            flex-wrap: wrap;
        }
        section{
            background-color: #eee;
            flex: 0 24%;
            text-align: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <section>A</section>
        <section>B</section>
        <section>C</section>
    </div>
</body>
</html>
