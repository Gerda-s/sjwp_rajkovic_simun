    <title>Zadaća 3</title>
    <style>
        *{
            background-color: #1C1919;
        }
        .nav{
            overflow: hidden;
            background-color: #302C2C;
        }
        .nav a{
            background-color: #302C2C;
            float: left;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
        }
        .nav a:hover{
            background-color: #f2f2f2;
            color: black;
        }
        .nav a:active{
            color: white;
            background-color: #FFCC47;
        }
        .container{
            display: grid;
            gap: 30px;
            padding: 20px;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
        }
        .container div{
            height: 500px;
            width: 335px;
            border: 4px solid rgb(255,255,255);
        }
        p{
            color: white;
            text-align: center;
            font-size: 20px;
            
            
        }
        img{
            height: 420px;
            width: 335px;
            object-fit: cover;
        }
        .container div:hover{
            transform: scale(1.05);
        }
    </style>
</head>
