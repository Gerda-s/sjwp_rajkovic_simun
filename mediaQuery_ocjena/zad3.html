<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            padding: 10px;
            gap: 10px;
            height: 100vh;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        section{
            text-align: center;
            flex: 0 32%;
            border: 5px solid black;
        }
        @media (min-width:768px) and (max-width:1023px){
            section{
                flex: 0 49%;
            }
        }
        @media (max-width:767px){
            section{
                flex: 0 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section>Slika 1</section>
        <section>Slika 2</section>
        <section>Slika 3</section>
        <section>Slika 4</section>
        <section>Slika 5</section>
        <section>Slika 6</section>
        <section>Slika 7</section>
        <section>Slika 8</section>
        <section>Slika 9</section>
        <section>Slika 10</section>
        <section>Slika 11</section>
        <section>Slika 12</section>
    </div>
</body>
</html>
